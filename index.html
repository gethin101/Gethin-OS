<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gethin OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Desktop -->
  <div id="desktop">
    <div class="desktop-icon" data-app="explorer">
      <img src="assets/explorer.png" class="desktop-icon-img" />
      <span>File Explorer</span>
    </div>

    <div class="desktop-icon" data-app="notes">
      <img src="assets/notes.png" class="desktop-icon-img" />
      <span>Notes</span>
    </div>

    <div class="desktop-icon" data-app="terminal">
      <img src="assets/terminal.png" class="desktop-icon-img" />
      <span>Terminal</span>
    </div>

    <div class="desktop-icon" data-app="soundboard">
      <img src="assets/soundboard.png" class="desktop-icon-img" />
      <span>Soundboard</span>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="taskbar-left">
      <button id="start-button" class="taskbar-start">
        <img src="assets/start.png" class="taskbar-start-img" />
      </button>
    </div>

    <div id="taskbar-center">
      <button class="taskbar-icon pinned" data-app="explorer">
        <img src="assets/explorer.png" class="taskbar-icon-img" />
      </button>
      <button class="taskbar-icon pinned" data-app="notes">
        <img src="assets/notes.png" class="taskbar-icon-img" />
      </button>
      <button class="taskbar-icon pinned" data-app="terminal">
        <img src="assets/terminal.png" class="taskbar-icon-img" />
      </button>
      <button class="taskbar-icon pinned" data-app="soundboard">
        <img src="assets/soundboard.png" class="taskbar-icon-img" />
      </button>
      <div id="taskbar-apps"></div>
    </div>

    <div id="taskbar-right">
      <button id="volume-button" class="tray-btn">
        <span id="volume-icon" class="tray-icon">🔊</span>
      </button>
      <button id="wifi-button" class="tray-btn">
        <span class="tray-icon">📶</span>
      </button>
      <span class="tray-icon">🔋</span>
      <button id="datetime-button" class="tray-clock-btn">
        <div class="tray-clock">
          <div id="tray-time"></div>
          <div id="tray-date"></div>
        </div>
      </button>
    </div>
  </div>

  <!-- Minimized area -->
  <div id="minimized-area"></div>

  <!-- Start Menu -->
  <div id="start-menu" class="hidden">
    <div class="start-header">Gethin OS</div>
    <div class="start-grid">
      <button class="start-app" data-app="explorer">File Explorer</button>
      <button class="start-app" data-app="notes">Notes</button>
      <button class="start-app" data-app="terminal">Terminal</button>
      <button class="start-app" data-app="soundboard">Soundboard</button>
    </div>
  </div>

  <!-- Volume Popup -->
  <div id="volume-popup" class="popup hidden">
    <div class="popup-section">
      <div class="popup-title">Volume</div>
      <div class="volume-row">
        <span id="volume-icon-popup" class="tray-icon">🔊</span>
        <input id="volume-slider" type="range" min="0" max="100" value="70" />
      </div>
    </div>
  </div>

  <!-- WiFi Popup -->
  <div id="wifi-popup" class="popup hidden">
    <div class="popup-section">
      <div class="popup-title">Wi‑Fi</div>
      <div class="wifi-network"><strong>Your Wi‑Fi</strong> — Connected, secured</div>
      <div class="wifi-network">Neighbour 1 Wi‑Fi</div>
      <div class="wifi-network">Neighbour 2 Wi‑Fi</div>
      <div class="wifi-network">Guest Wi‑Fi</div>
    </div>
  </div>

  <!-- Date/Time Popup -->
  <div id="datetime-popup" class="popup hidden">
    <div class="popup-section">
      <div class="popup-title" id="popup-date-title"></div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
  </div>

  <!-- Windows -->
  <div id="window-layer"></div>

  <script src="script.js"></script>
</body>
</html>
