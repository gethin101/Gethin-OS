<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gethin OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Boot screen -->
  <div id="boot-screen">
    <div class="boot-logo">Gethin OS</div>
    <div class="boot-bar">
      <div class="boot-bar-fill"></div>
    </div>
  </div>

  <!-- Lock screen -->
  <div id="lock-screen" class="hidden">
    <div class="lock-time" id="lock-time"></div>
    <div class="lock-user">gethin</div>
    <button id="unlock-btn">Press to enter</button>
  </div>

  <!-- Main OS -->
  <div id="os" class="hidden">
    <div id="desktop">
      <div class="desktop-icon" data-app="about">
        <div class="icon-square icon-about"></div>
        <span>About Gethin OS</span>
      </div>
      <div class="desktop-icon" data-app="notes">
        <div class="icon-square icon-notes"></div>
        <span>Notes</span>
      </div>
    </div>

    <div id="taskbar">
      <div id="start-button">⊞ Gethin</div>
      <div id="taskbar-apps"></div>
      <div id="taskbar-clock"></div>
    </div>

    <div id="start-menu" class="hidden">
      <div class="start-header">Gethin OS</div>
      <div class="start-apps">
        <button class="start-app" data-app="about">About Gethin OS</button>
        <button class="start-app" data-app="notes">Notes</button>
      </div>
    </div>

    <!-- Window container -->
    <div id="window-layer"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
